name: cat-top-order
display_name: "Category Theory / Topology / Order Theory"
description: >
  Citation skill for pure mathematics, especially category theory and topology.
  Relies heavily on theorem environments and MathSciNet/nLab.

# ---- citable block scanning ----
scan_strategies:
  - type: env
    envs:
      statement:
        - theorem
        - proposition
        - lemma
        - corollary
        - definition
        - thm
        - prop
        - lem
        - cor
        - defn
        - pthm
        - pprop
        - pcor
        - plem
      narrative:
        - remark
        - example
        - rem
        - expl

  - type: pattern
    patterns:
      - "by a theorem of"
      - "it is a classical result that"
      - "as proved in"
      - "the notion of"
      - "we briefly review the theory of"
      - "recall that"
      - "by the Morita theory"
      - "by the Yoneda lemma"
      - "by the Baez-Dolan cobordism hypothesis"
      - "\\cite{}"

  - type: section
    sections:
      - "Introduction"
      - "Preliminaries"
      - "Review"
      - "Background"

# ---- source preference ----
sources:
  primary:
    - mathscinet
    - nlab
  verify:
    - arxiv
    - google_scholar

arxiv_categories:
  - math.CT
  - math.AT
  - math.QA
  - math-ph
  - hep-th

# ---- bib key style ----
key_style: "AuthorYear"
key_examples:
  - "MacLane1998"
  - "LurieHA"
  - "Joyal02"

# ---- citation macros ----
cite_macros:
  - "\\cite"
  - "\\cite[]"

# ---- skip patterns ----
skip_patterns:
  - "\\todo"
  - "FIXME"

# ---- canonical references ----
canonical_references:
  "Higher Algebra": "LurieHA"
  "Categories for the Working Mathematician": "MacLane1998"
